<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product - ShopCloud</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .product-page {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      flex: 1;
    }
    .product-image-box {
      background: white;
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky;
      top: 80px;
      height: fit-content;
    }
    .product-image-box img {
      width: 100%;
      max-width: 340px;
      border-radius: 8px;
      object-fit: cover;
    }
    .product-info {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .product-info .brand {
      font-size: 13px;
      color: #007185;
      font-weight: 700;
      text-transform: uppercase;
    }
    .product-info h1 {
      font-size: 24px;
      color: #0f1111;
      line-height: 1.3;
    }
    .rating { font-size: 14px; color: #ff9900; }
    .price-box {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .price { font-size: 28px; font-weight: bold; color: #0f1111; }
    .original-price { font-size: 15px; color: #888; text-decoration: line-through; margin-left: 8px; }
    .discount { font-size: 15px; color: #cc0c39; font-weight: 700; margin-left: 6px; }
    .delivery { font-size: 14px; color: #007600; font-weight: 500; }
    .stock { font-size: 18px; color: #007600; font-weight: 600; }
    .features {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .features h3 { font-size: 15px; margin-bottom: 10px; color: #0f1111; }
    .features ul { list-style: none; padding: 0; margin: 0; }
    .features ul li {
      font-size: 13px;
      color: #444;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      line-height: 1.4;
    }
    .features ul li:last-child { border-bottom: none; }
    .features ul li::before { content: "✔ "; color: #007600; font-weight: bold; }
    .add-btn {
      background: #ff9900;
      color: #131921;
      border: none;
      padding: 14px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .add-btn:hover { background: #e68900; }
    .buy-btn {
      background: #ff6600;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .buy-btn:hover { background: #e65c00; }
    .breadcrumb {
      max-width: 1100px;
      margin: 16px auto 0;
      padding: 0 20px;
      font-size: 13px;
      color: #565959;
    }
    .breadcrumb a { color: #007185; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; color: #c45500; }
    .loading-box {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      font-size: 15px;
      color: #565959;
    }
    @media (max-width: 768px) {
      .product-page { grid-template-columns: 1fr; }
      .product-image-box { position: static; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="logo">🛒 ShopCloud</a>
      <div class="search-bar">
        <input type="text" placeholder="Search for products, brands and more..."/>
        <button class="search-btn">🔍</button>
      </div>
    </div>
    <div class="topbar-right">
      <a href="login.html" class="top-link" id="auth-link">
        <span class="link-sub">Hello, Sign in</span>
        <span class="link-main">Account &amp; Lists</span>
      </a>
      
      <a href="order.html" class="top-link">
        <span class="link-sub">Returns</span>
        <span class="link-main">&amp; Orders</span>
      </a>

       <a href="index.html" class="top-link">
        <span class="link-sub">Back to</span>
        <span class="link-main">Shopping</span>
      </a>

      <a href="cart.html" class="cart-icon">
        🛒 <span class="cart-num" id="cart-count">0</span>
        <span class="link-main">Cart</span>
      </a>
    </div>
  </div>

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <a href="index.html">Home</a> &nbsp;›&nbsp;
    <span id="product-breadcrumb">Product</span>
  </div>

  <!-- PRODUCT PAGE -->
  <div class="product-page" id="product-page">
    <div class="loading-box">⏳ Loading product...</div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-bottom">
      <p>🛒 ShopCloud &copy; 2026 &nbsp;|&nbsp; Built on AWS &nbsp;|&nbsp; All rights reserved</p>
    </div>
  </footer>

  <!-- Cognito SDK -->
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>

  <script>
    const API_URL = 'https://74koa1oin1.execute-api.ap-south-1.amazonaws.com';

    // Get product name from URL
    const params = new URLSearchParams(window.location.search);
    const productName = decodeURIComponent(params.get('name') || 'Laptop Pro X');

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      document.getElementById('cart-count').textContent = cart.length;
    }

    // Load product from real DynamoDB API
    async function loadProduct() {
      const page = document.getElementById('product-page');

      try {
        const response = await fetch(API_URL + '/products');
        const products = await response.json();

        // Find matching product by name
        const product = products.find(p => p.name === productName);

        if (!product) {
          page.innerHTML = `
            <div class="loading-box">
              <div style="font-size:48px;margin-bottom:16px">😕</div>
              <h3>Product not found</h3>
              <p style="margin:10px 0 20px;color:#565959">The product you're looking for doesn't exist.</p>
              <a href="index.html" style="background:#ff9900;color:#131921;padding:10px 24px;border-radius:20px;text-decoration:none;font-weight:bold;">Back to Home</a>
            </div>`;
          return;
        }

        // Update page title and breadcrumb
        document.title = product.name + ' - ShopCloud';
        document.getElementById('product-breadcrumb').textContent = product.name;

        // Build stars
        const stars = '⭐'.repeat(Number(product.rating));

        // Build features from description
        const featureItems = product.description.split(',').map(f =>
          `<li>${f.trim()}</li>`).join('');

        // Render product page
        page.innerHTML = `
          <!-- LEFT: Image -->
          <div class="product-image-box">
            <img src="${product.image}"
              alt="${product.name}"
              onerror="this.src='https://placehold.co/340x300/f5f5f5/333?text=Product'"
              style="width:100%;border-radius:8px;object-fit:cover"/>
          </div>

          <!-- RIGHT: Info -->
          <div class="product-info">
            <div class="brand">${product.brand}</div>
            <h1>${product.name}</h1>
            <div class="rating">
              ${stars}
              <span style="color:#007185;font-size:13px">(${product.ratingCount} ratings)</span>
            </div>

            <div class="price-box">
              <span class="price">₹${Number(product.price).toLocaleString()}</span>
              <span class="original-price">₹${Number(product.originalPrice).toLocaleString()}</span>
              <span class="discount">${product.discount}</span>
              <p style="font-size:12px;color:#565959;margin-top:6px">Inclusive of all taxes</p>
            </div>

            <div class="delivery">✅ FREE Delivery by Tomorrow</div>
            <div class="stock">✅ In Stock</div>

            <div class="features">
              <h3>Key Features</h3>
              <ul>${featureItems}</ul>
            </div>

            <button class="add-btn" id="add-btn" onclick="addToCart()">🛒 Add to Cart</button>
            <button class="buy-btn" onclick="buyNow()">⚡ Buy Now</button>
          </div>`;

        // Store product data for cart functions
        window.currentProduct = product;

      } catch (error) {
        console.error('Error loading product:', error);
        page.innerHTML = `
          <div class="loading-box">
            <div style="font-size:48px;margin-bottom:16px">❌</div>
            <h3>Error loading product</h3>
            <p style="color:#565959;margin:10px 0 20px">Please check your connection and try again.</p>
            <a href="index.html" style="background:#ff9900;color:#131921;padding:10px 24px;border-radius:20px;text-decoration:none;font-weight:bold;">Back to Home</a>
          </div>`;
      }
    }

    function addToCart() {
      const product = window.currentProduct;
      if (!product) return;
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.push({ name: product.name, price: Number(product.price) });
      localStorage.setItem('cart', JSON.stringify(cart));
      const btn = document.getElementById('add-btn');
      btn.textContent = '✅ Added to Cart!';
      btn.style.background = '#28a745';
      btn.style.color = 'white';
      setTimeout(() => {
        btn.textContent = '🛒 Add to Cart';
        btn.style.background = '';
        btn.style.color = '';
      }, 1500);
      updateCartCount();
    }

    function buyNow() {
      const product = window.currentProduct;
      if (!product) return;
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.push({ name: product.name, price: Number(product.price) });
      localStorage.setItem('cart', JSON.stringify(cart));
      window.location.href = 'cart.html';
    }

    // Cognito auth — show name in navbar
    const poolData = {
      UserPoolId: 'ap-south-1_zWnAt9zu0',
      ClientId: '795g14phrivadirpbnoefu8j9c'
    };
    const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);
    const currentUser = userPool.getCurrentUser();

    if (currentUser) {
      currentUser.getSession((err, session) => {
        if (!err && session.isValid()) {
          const user = JSON.parse(localStorage.getItem('shopcloud_user') || '{}');
          const link = document.getElementById('auth-link');
          if (link && user.name) {
            const firstName = user.name.split(' ')[0];
            link.querySelector('.link-sub').textContent = 'Hello, ' + firstName;
            link.querySelector('.link-main').textContent = 'Account & Lists';
            link.href = '#';
            link.onclick = function() {
              if (confirm('Do you want to sign out?')) {
                currentUser.signOut();
                localStorage.removeItem('shopcloud_token');
                localStorage.removeItem('shopcloud_user');
                window.location.reload();
              }
            };
          }
        }
      });
    }

    updateCartCount();
    loadProduct();
  </script>

</body>
</html>
