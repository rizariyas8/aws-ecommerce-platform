<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seller Dashboard - ShopCloud</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dashboard { max-width: 1100px; margin: 30px auto; padding: 0 20px; flex: 1; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #ddd; }
    .dash-header h2 { font-size: 22px; color: #0f1111; }
    .dash-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #eee; }
    .dash-tab { padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600; color: #565959; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .dash-tab:hover { color: #0f1111; }
    .dash-tab.active { color: #ff9900; border-bottom-color: #ff9900; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
    .stat-icon { font-size: 32px; margin-bottom: 8px; }
    .stat-value { font-size: 26px; font-weight: bold; color: #0f1111; }
    .stat-label { font-size: 13px; color: #565959; margin-top: 4px; }
    .form-card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .form-card h3 { font-size: 16px; margin-bottom: 20px; color: #0f1111; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 13px; font-weight: 600; color: #0f1111; }
    .form-group input, .form-group select, .form-group textarea { padding: 9px 12px; border: 1px solid #aaa; border-radius: 4px; font-size: 14px; outline: none; transition: border 0.2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #ff9900; box-shadow: 0 0 0 2px rgba(255,153,0,0.2); }
    .submit-btn { background: #ff9900; color: #131921; border: none; padding: 12px 28px; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 16px; transition: background 0.2s; }
    .submit-btn:hover { background: #e68900; }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
    .table-card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
    .table-header { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .table-header h3 { font-size: 15px; color: #0f1111; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f5f5f5; padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; color: #565959; text-transform: uppercase; }
    td { padding: 10px 16px; font-size: 13px; color: #0f1111; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .product-img-thumb { width: 50px; height: 40px; object-fit: cover; border-radius: 4px; background: #f5f5f5; }
    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .status-CONFIRMED { background: #EAF3DE; color: #27500A; }
    .status-PENDING { background: #FAEEDA; color: #633806; }
    .status-SHIPPED { background: #E6F1FB; color: #0C447C; }
    .status-DELIVERED { background: #EAF3DE; color: #27500A; }
    .status-select { padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .update-btn { background: #ff9900; color: #131921; border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: 6px; }
    .update-btn:hover { background: #e68900; }
    .edit-btn { background: #007185; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; margin-right: 4px; }
    .edit-btn:hover { background: #005a6a; }
    .delete-btn { background: #cc0c39; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .delete-btn:hover { background: #aa0a30; }
    .msg-box { padding: 10px 16px; border-radius: 4px; font-size: 13px; margin-bottom: 16px; display: none; }
    .msg-box.success { background: #f0fef4; color: #006600; border: 1px solid #99ddaa; display: block; }
    .msg-box.error { background: #fef0f0; color: #cc0000; border: 1px solid #ffcccc; display: block; }
    .stock-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: white; border-radius: 12px; padding: 28px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .modal-box h3 { font-size: 18px; margin-bottom: 20px; color: #0f1111; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .cancel-btn { background: #f5f5f5; color: #0f1111; border: 1px solid #ddd; padding: 10px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: 600; }
    .save-btn { background: #ff9900; color: #131921; border: none; padding: 10px 20px; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .save-btn:hover { background: #e68900; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="logo">🛒 ShopCloud</a>
      <div class="search-bar">
        <input type="text" placeholder="Search..."/>
        <button class="search-btn">🔍</button>
      </div>
    </div>
    <div class="topbar-right">
      <a href="#" class="top-link" id="seller-name-link">
        <span class="link-sub">Seller</span>
        <span class="link-main">Dashboard</span>
      </a>
      <a href="index.html" class="top-link">
        <span class="link-sub">Go to</span>
        <span class="link-main">Store</span>
      </a>
      <a href="#" class="cart-icon" onclick="signOutSeller()">
        🚪 <span class="link-main">Sign Out</span>
      </a>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div style="text-align:center;padding:60px;color:#565959">⏳ Loading dashboard...</div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal-box">
      <h3>✏️ Edit Product</h3>
      <input type="hidden" id="edit-productId"/>
      <div class="form-grid">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="edit-name"/>
        </div>
        <div class="form-group">
          <label>Brand</label>
          <input type="text" id="edit-brand"/>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="edit-category">
            <option value="electronics">Electronics</option>
            <option value="audio">Audio</option>
            <option value="wearables">Wearables</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>
        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" id="edit-price"/>
        </div>
        <div class="form-group">
          <label>Original Price (₹)</label>
          <input type="number" id="edit-original"/>
        </div>
        <div class="form-group">
          <label>Discount</label>
          <input type="text" id="edit-discount"/>
        </div>
        <div class="form-group full">
          <label>Image URL</label>
          <input type="text" id="edit-image"/>
        </div>
        <div class="form-group full">
          <label>Description</label>
          <textarea id="edit-desc" rows="2"></textarea>
        </div>
        <div class="form-group full">
          <label>Stock Status</label>
          <select id="edit-instock">
            <option value="true">✅ In Stock</option>
            <option value="false">❌ Out of Stock</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
        <button class="save-btn" onclick="saveProduct()">💾 Save Changes</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-bottom">
      <p>🛒 ShopCloud &copy; 2026 &nbsp;|&nbsp; Built on AWS &nbsp;|&nbsp; Seller Dashboard</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
  <script>
    const API_URL = 'https://74koa1oin1.execute-api.ap-south-1.amazonaws.com';
    const poolData = { UserPoolId: 'ap-south-1_zWnAt9zu0', ClientId: '795g14phrivadirpbnoefu8j9c' };
    const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);
    const currentUser = userPool.getCurrentUser();
    let allProducts = [];
    let allOrders = [];

    function signOutSeller() {
      if (confirm('Sign out of seller dashboard?')) {
        if (currentUser) currentUser.signOut();
        localStorage.removeItem('shopcloud_token');
        localStorage.removeItem('shopcloud_user');
        window.location.href = 'login.html';
      }
    }

    function switchTab(tabName) {
      document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      document.getElementById('content-' + tabName).classList.add('active');
    }

    // ===== EDIT MODAL =====
    function openEditModal(productId) {
      const product = allProducts.find(p => p.productId === productId);
      if (!product) return;
      document.getElementById('edit-productId').value = product.productId;
      document.getElementById('edit-name').value = product.name;
      document.getElementById('edit-brand').value = product.brand;
      document.getElementById('edit-category').value = product.category;
      document.getElementById('edit-price').value = product.price;
      document.getElementById('edit-original').value = product.originalPrice;
      document.getElementById('edit-discount').value = product.discount;
      document.getElementById('edit-image').value = product.image;
      document.getElementById('edit-desc').value = product.description;
      document.getElementById('edit-instock').value = product.inStock ? 'true' : 'false';
      document.getElementById('edit-modal').classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('show');
    }

    async function saveProduct() {
      const productId = document.getElementById('edit-productId').value;
      const updatedProduct = {
        productId,
        name: document.getElementById('edit-name').value.trim(),
        brand: document.getElementById('edit-brand').value.trim(),
        category: document.getElementById('edit-category').value,
        price: Number(document.getElementById('edit-price').value),
        originalPrice: Number(document.getElementById('edit-original').value),
        discount: document.getElementById('edit-discount').value.trim(),
        image: document.getElementById('edit-image').value.trim(),
        description: document.getElementById('edit-desc').value.trim(),
        inStock: document.getElementById('edit-instock').value === 'true'
      };

      try {
        const response = await fetch(API_URL + '/products/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updatedProduct)
        });
        const result = await response.json();
        if (result.success) {
          alert('✅ Product updated successfully!');
          closeEditModal();
          loadDashboard();
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        alert('❌ Error updating product: ' + error.message);
      }
    }

    async function deleteProduct(productId, productName) {
      if (!confirm(`Are you sure you want to delete "${productName}"? This cannot be undone.`)) return;
      try {
        const response = await fetch(API_URL + '/products/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId })
        });
        const result = await response.json();
        if (result.success) {
          alert('✅ Product deleted successfully!');
          loadDashboard();
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        alert('❌ Error deleting product: ' + error.message);
      }
    }

    async function updateOrderStatus(orderId) {
      const newStatus = document.getElementById('status-' + orderId).value;
      try {
        const response = await fetch(API_URL + '/orders/status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId, status: newStatus })
        });
        const result = await response.json();
        if (result.success) {
          alert('✅ Order status updated to ' + newStatus);
          loadDashboard();
        } else { throw new Error(result.error); }
      } catch (error) {
        alert('❌ Error: ' + error.message);
      }
    }

    async function addProduct() {
      const name = document.getElementById('p-name').value.trim();
      const brand = document.getElementById('p-brand').value.trim();
      const category = document.getElementById('p-category').value;
      const price = document.getElementById('p-price').value;
      const original = document.getElementById('p-original').value;
      const discount = document.getElementById('p-discount').value.trim();
      const rating = document.getElementById('p-rating').value;
      const ratingCount = document.getElementById('p-ratingcount').value.trim();
      const image = document.getElementById('p-image').value.trim();
      const desc = document.getElementById('p-desc').value.trim();
      const msgBox = document.getElementById('add-msg');
      const btn = document.getElementById('add-btn');

      if (!name || !brand || !category || !price || !original || !discount || !image || !desc) {
        msgBox.className = 'msg-box error';
        msgBox.textContent = 'Please fill in all required fields.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Adding...';

      try {
        const response = await fetch(API_URL + '/products', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name, brand, category,
            price: Number(price),
            originalPrice: Number(original),
            discount, rating: Number(rating),
            ratingCount: ratingCount || '0',
            image, description: desc, inStock: true
          })
        });
        const result = await response.json();
        if (result.success) {
          msgBox.className = 'msg-box success';
          msgBox.textContent = '✅ Product added successfully!';
          ['p-name','p-brand','p-price','p-original','p-discount','p-ratingcount','p-image','p-desc']
            .forEach(id => document.getElementById(id).value = '');
          setTimeout(() => { loadDashboard(); switchTab('products'); }, 1500);
        } else { throw new Error(result.error || 'Failed'); }
      } catch (error) {
        msgBox.className = 'msg-box error';
        msgBox.textContent = '❌ Error: ' + error.message;
      }
      btn.disabled = false;
      btn.textContent = '➕ Add Product';
    }

    async function loadDashboard() {
      const dash = document.getElementById('dashboard');
      const user = JSON.parse(localStorage.getItem('shopcloud_user') || '{}');
      const nameLink = document.getElementById('seller-name-link');
      if (nameLink && user.name) {
        nameLink.querySelector('.link-sub').textContent = 'Hello, ' + user.name.split(' ')[0];
      }

      try {
        const [productsRes, ordersRes] = await Promise.all([
          fetch(API_URL + '/products'),
          fetch(API_URL + '/orders?email=all')
        ]);
        allProducts = await productsRes.json();
        const ordersData = await ordersRes.json();
        allOrders = ordersData.orders || [];

        const totalRevenue = allOrders.reduce((sum, o) => sum + Number(o.total || 0), 0);
        const confirmedOrders = allOrders.filter(o => o.status === 'CONFIRMED').length;

        dash.innerHTML = `
          <div class="dash-header">
            <h2>🏪 Seller Dashboard</h2>
            <span style="font-size:13px;color:#565959">Welcome, ${user.name || 'Seller'}!</span>
          </div>
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${allProducts.length}</div><div class="stat-label">Total Products</div></div>
            <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-value">${allOrders.length}</div><div class="stat-label">Total Orders</div></div>
            <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${confirmedOrders}</div><div class="stat-label">Confirmed</div></div>
            <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">₹${totalRevenue.toLocaleString()}</div><div class="stat-label">Revenue</div></div>
          </div>
          <div class="dash-tabs">
            <div class="dash-tab active" id="tab-products" onclick="switchTab('products')">📦 Products (${allProducts.length})</div>
            <div class="dash-tab" id="tab-add" onclick="switchTab('add')">➕ Add Product</div>
            <div class="dash-tab" id="tab-orders" onclick="switchTab('orders')">🛒 Orders (${allOrders.length})</div>
          </div>

          <!-- PRODUCTS TAB -->
          <div class="tab-content active" id="content-products">
            <div class="table-card">
              <div class="table-header"><h3>All Products</h3></div>
              <table>
                <thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Category</th><th>Stock</th><th>Actions</th></tr></thead>
                <tbody>
                  ${allProducts.map(p => `
                    <tr>
                      <td><img src="${p.image}" class="product-img-thumb" onerror="this.src='https://placehold.co/50x40/f5f5f5/333?text=P'"/></td>
                      <td><strong>${p.name}</strong><br/><span style="font-size:11px;color:#565959">${p.brand}</span></td>
                      <td>₹${Number(p.price).toLocaleString()}<br/><span style="font-size:11px;color:#cc0c39">${p.discount}</span></td>
                      <td>${p.category}</td>
                      <td>${p.inStock ? '<span style="color:#007600;font-weight:600">✅ In Stock</span>' : '<span style="color:#cc0000;font-weight:600">❌ Out of Stock</span>'}</td>
                      <td>
                        <button class="edit-btn" onclick="openEditModal('${p.productId}')">✏️ Edit</button>
                        <button class="delete-btn" onclick="deleteProduct('${p.productId}', '${p.name}')">🗑️ Delete</button>
                      </td>
                    </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>

          <!-- ADD PRODUCT TAB -->
          <div class="tab-content" id="content-add">
            <div class="form-card">
              <h3>➕ Add New Product</h3>
              <div class="msg-box" id="add-msg"></div>
              <div class="form-grid">
                <div class="form-group"><label>Product Name *</label><input type="text" id="p-name" placeholder="e.g. iPhone 15 Pro"/></div>
                <div class="form-group"><label>Brand *</label><input type="text" id="p-brand" placeholder="e.g. Apple"/></div>
                <div class="form-group"><label>Category *</label>
                  <select id="p-category">
                    <option value="">Select</option>
                    <option value="electronics">Electronics</option>
                    <option value="audio">Audio</option>
                    <option value="wearables">Wearables</option>
                    <option value="accessories">Accessories</option>
                  </select>
                </div>
                <div class="form-group"><label>Price (₹) *</label><input type="number" id="p-price"/></div>
                <div class="form-group"><label>Original Price (₹) *</label><input type="number" id="p-original"/></div>
                <div class="form-group"><label>Discount *</label><input type="text" id="p-discount" placeholder="e.g. 23% off"/></div>
                <div class="form-group"><label>Rating</label>
                  <select id="p-rating"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option></select>
                </div>
                <div class="form-group"><label>Rating Count</label><input type="text" id="p-ratingcount" placeholder="e.g. 1,234"/></div>
                <div class="form-group full"><label>Image URL *</label><input type="text" id="p-image" placeholder="https://shopcloud-riza-demo.s3.ap-south-1.amazonaws.com/images/..."/></div>
                <div class="form-group full"><label>Description *</label><textarea id="p-desc" rows="2" placeholder="Feature 1, Feature 2, Feature 3"></textarea></div>
              </div>
              <button class="submit-btn" id="add-btn" onclick="addProduct()">➕ Add Product</button>
            </div>
          </div>

          <!-- ORDERS TAB -->
          <div class="tab-content" id="content-orders">
            <div class="table-card">
              <div class="table-header"><h3>All Orders (${allOrders.length})</h3></div>
              <table>
                <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Date</th><th>Status</th><th>Update</th></tr></thead>
                <tbody>
                  ${allOrders.length === 0
                    ? '<tr><td colspan="7" style="text-align:center;padding:30px;color:#565959">No orders yet</td></tr>'
                    : allOrders.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).map(o => `
                    <tr>
                      <td style="font-size:11px">${o.orderId}</td>
                      <td><strong>${o.customerName || 'N/A'}</strong><br/><span style="font-size:11px;color:#565959">${o.customerEmail || ''}</span></td>
                      <td style="font-size:12px">${(o.items || []).map(i => i.name).join(', ')}</td>
                      <td>₹${Number(o.total || 0).toLocaleString()}</td>
                      <td style="font-size:11px">${o.createdAt ? new Date(o.createdAt).toLocaleDateString('en-IN') : 'N/A'}</td>
                      <td><span class="status-badge status-${o.status || 'PENDING'}">${o.status || 'PENDING'}</span></td>
                      <td>
                        <select class="status-select" id="status-${o.orderId}">
                          <option value="CONFIRMED" ${o.status==='CONFIRMED'?'selected':''}>Confirmed</option>
                          <option value="SHIPPED" ${o.status==='SHIPPED'?'selected':''}>Shipped</option>
                          <option value="DELIVERED" ${o.status==='DELIVERED'?'selected':''}>Delivered</option>
                          <option value="PENDING" ${o.status==='PENDING'?'selected':''}>Pending</option>
                        </select>
                        <button class="update-btn" onclick="updateOrderStatus('${o.orderId}')">Update</button>
                      </td>
                    </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>`;

      } catch (error) {
        dash.innerHTML = `<div style="text-align:center;padding:40px;color:#cc0000">❌ Error loading dashboard. Please refresh.</div>`;
      }
    }

    if (currentUser) {
      currentUser.getSession((err, session) => {
        if (!err && session.isValid()) { loadDashboard(); }
        else { window.location.href = 'login.html'; }
      });
    } else { window.location.href = 'login.html'; }
  </script>
