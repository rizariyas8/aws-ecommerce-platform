<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders - ShopCloud</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .orders-page {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
      flex: 1;
    }
    .orders-page h2 {
      font-size: 22px;
      color: #0f1111;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ddd;
    }
    .order-card {
      background: white;
      border-radius: 8px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .order-header {
      background: #f5f5f5;
      padding: 12px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 12px;
      border-bottom: 1px solid #ddd;
    }
    .order-header-item { font-size: 12px; }
    .order-header-item .label {
      color: #565959;
      text-transform: uppercase;
      font-size: 11px;
      margin-bottom: 3px;
    }
    .order-header-item .value {
      font-size: 13px;
      font-weight: 600;
      color: #0f1111;
    }
    .order-body { padding: 16px 20px; }
    .order-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
    }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-name { color: #007185; font-weight: 500; }
    .order-item-price { font-weight: 600; color: #0f1111; }
    .order-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-CONFIRMED { background: #EAF3DE; color: #27500A; }
    .status-PENDING { background: #FAEEDA; color: #633806; }
    .status-SHIPPED { background: #E6F1FB; color: #0C447C; }
    .status-DELIVERED { background: #EAF3DE; color: #27500A; }
    .status-FAILED { background: #FAECE7; color: #712B13; }
    .order-footer {
      padding: 12px 20px;
      background: #fafafa;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .order-total { font-size: 15px; font-weight: bold; color: #0f1111; }
    .order-address { font-size: 12px; color: #565959; }
    .empty-orders {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 8px;
    }
    .empty-orders .icon { font-size: 64px; margin-bottom: 16px; }
    .empty-orders h3 { font-size: 20px; margin-bottom: 8px; }
    .empty-orders p { color: #565959; margin-bottom: 20px; }
    .shop-btn {
      background: #ff9900;
      color: #131921;
      padding: 12px 28px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
      display: inline-block;
    }
    .shop-btn:hover { background: #e68900; }
    .login-required {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 8px;
    }
    @media (max-width: 600px) {
      .order-header { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="logo">🛒 ShopCloud</a>
      <div class="search-bar">
        <input type="text" placeholder="Search for products..."/>
        <button class="search-btn">🔍</button>
      </div>
    </div>
    <div class="topbar-right">
      <a href="login.html" class="top-link" id="auth-link">
        <span class="link-sub">Hello, Sign in</span>
        <span class="link-main">Account &amp; Lists</span>
      </a>
       <a href="index.html" class="top-link">
        <span class="link-sub">Back to</span>
        <span class="link-main">Shopping</span>
      </a>
      <a href="cart.html" class="cart-icon">
        🛒 <span class="cart-num" id="cart-count">0</span>
        <span class="link-main">Cart</span>
      </a>
    </div>
  </div>

  <!-- ORDERS PAGE -->
  <div class="orders-page">
    <h2>📦 My Orders</h2>
    <div id="orders-container">
      <div style="text-align:center;padding:40px;color:#565959">⏳ Loading your orders...</div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-bottom">
      <p>🛒 ShopCloud &copy; 2026 &nbsp;|&nbsp; Built on AWS &nbsp;|&nbsp; All rights reserved</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>

  <script>
    const API_URL = 'https://74koa1oin1.execute-api.ap-south-1.amazonaws.com';

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      document.getElementById('cart-count').textContent = cart.length;
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-IN', {
        day: 'numeric', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function getStatusClass(status) {
      return 'status-' + (status || 'PENDING');
    }

    async function loadOrders(userEmail) {
      const container = document.getElementById('orders-container');

      try {
        const response = await fetch(`${API_URL}/orders?email=${encodeURIComponent(userEmail)}`);
        const data = await response.json();

        if (!data.orders || data.orders.length === 0) {
          container.innerHTML = `
            <div class="empty-orders">
              <div class="icon">📦</div>
              <h3>No orders yet</h3>
              <p>You haven't placed any orders yet. Start shopping!</p>
              <a href="index.html" class="shop-btn">Shop Now</a>
            </div>`;
          return;
        }

        // Sort by date — newest first
        const orders = data.orders.sort((a, b) =>
          new Date(b.createdAt) - new Date(a.createdAt));

        container.innerHTML = '';

        orders.forEach(order => {
          const itemsHTML = (order.items || []).map(item => `
            <div class="order-item-row">
              <span class="order-item-name">${item.name}</span>
              <span class="order-item-price">₹${Number(item.price).toLocaleString()}</span>
            </div>`).join('');

          container.innerHTML += `
            <div class="order-card">
              <div class="order-header">
                <div class="order-header-item">
                  <div class="label">Order Placed</div>
                  <div class="value">${formatDate(order.createdAt)}</div>
                </div>
                <div class="order-header-item">
                  <div class="label">Total</div>
                  <div class="value">₹${Number(order.total).toLocaleString()}</div>
                </div>
                <div class="order-header-item">
                  <div class="label">Status</div>
                  <div class="value">
                    <span class="order-status ${getStatusClass(order.status)}">
                      ${order.status || 'PENDING'}
                    </span>
                  </div>
                </div>
                <div class="order-header-item">
                  <div class="label">Order ID</div>
                  <div class="value" style="font-size:11px">${order.orderId}</div>
                </div>
              </div>
              <div class="order-body">
                <h4 style="font-size:13px;color:#565959;margin-bottom:8px">Items Ordered:</h4>
                ${itemsHTML}
              </div>
              <div class="order-footer">
                <div class="order-address">
                  📍 ${order.address || 'Address not available'}
                </div>
                <div class="order-total">
                  Total: ₹${Number(order.total).toLocaleString()}
                </div>
              </div>
            </div>`;
        });

      } catch (error) {
        console.error('Error loading orders:', error);
        container.innerHTML = `
          <div class="empty-orders">
            <div class="icon">❌</div>
            <h3>Could not load orders</h3>
            <p style="color:#565959">Please try again later.</p>
            <a href="index.html" class="shop-btn">Back to Home</a>
          </div>`;
      }
    }

    // Check if user is logged in
    const poolData = {
      UserPoolId: 'ap-south-1_zWnAt9zu0',
      ClientId: '795g14phrivadirpbnoefu8j9c'
    };
    const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);
    const currentUser = userPool.getCurrentUser();

    if (currentUser) {
      currentUser.getSession((err, session) => {
        if (!err && session.isValid()) {
          const user = JSON.parse(localStorage.getItem('shopcloud_user') || '{}');

          // Update navbar
          const link = document.getElementById('auth-link');
          if (link && user.name) {
            const firstName = user.name.split(' ')[0];
            link.querySelector('.link-sub').textContent = 'Hello, ' + firstName;
            link.querySelector('.link-main').textContent = 'Account & Lists';
            link.href = '#';
            link.onclick = function() {
              if (confirm('Do you want to sign out?')) {
                currentUser.signOut();
                localStorage.removeItem('shopcloud_token');
                localStorage.removeItem('shopcloud_user');
                window.location.href = 'index.html';
              }
            };
          }

          // Load orders for this user
          if (user.email) {
            loadOrders(user.email);
          } else {
            document.getElementById('orders-container').innerHTML = `
              <div class="empty-orders">
                <div class="icon">📦</div>
                <h3>No orders found</h3>
                <p>We couldn't find orders for your account.</p>
                <a href="index.html" class="shop-btn">Shop Now</a>
              </div>`;
          }
        } else {
          // Not logged in
          document.getElementById('orders-container').innerHTML = `
            <div class="login-required">
              <div style="font-size:48px;margin-bottom:16px">🔐</div>
              <h3>Please sign in to view your orders</h3>
              <p style="color:#565959;margin:10px 0 20px">You need to be logged in to see your order history.</p>
              <a href="login.html" class="shop-btn">Sign In</a>
            </div>`;
        }
      });
    } else {
      document.getElementById('orders-container').innerHTML = `
        <div class="login-required">
          <div style="font-size:48px;margin-bottom:16px">🔐</div>
          <h3>Please sign in to view your orders</h3>
          <p style="color:#565959;margin:10px 0 20px">You need to be logged in to see your order history.</p>
          <a href="login.html" class="shop-btn">Sign In</a>
        </div>`;
    }

    updateCartCount();
  </script>

</body>
</html>
