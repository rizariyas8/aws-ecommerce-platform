<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Cart - ShopCloud</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">🛒 ShopCloud</div>
      <div class="search-bar">
        <input type="text" placeholder="Search for products..."/>
        <button class="search-btn">🔍</button>
      </div>
    </div>
    <div class="topbar-right">
      <a href="login.html" class="top-link" id="auth-link">
        <span class="link-sub">Hello, Sign in</span>
        <span class="link-main">Account &amp; Lists</span>
      </a>
      <a href="index.html" class="top-link">
        <span class="link-sub">Back to</span>
        <span class="link-main">Shopping</span>
      </a>
      <a href="cart.html" class="cart-icon">
        🛒 <span id="cart-count">0</span>
        <span class="link-main">Cart</span>
      </a>
    </div>
  </div>

  <!-- CART PAGE -->
  <div class="cart-page">

    <div class="cart-main">
      <h2>🛒 Shopping Cart</h2>
      <div id="cart-items"></div>
    </div>

    <div class="cart-summary">
      <div class="summary-box">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal (<span id="item-count">0</span> items)</span>
          <span id="subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>Delivery</span>
          <span class="free">FREE</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total-price">₹0</span>
        </div>
        <button class="checkout-btn" id="checkout-btn" onclick="window.location.href='checkout.html'">
            Proceed to Checkout →
        </button>
        <p class="secure-note">🔒 Safe and Secure Payments</p>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-bottom">
      <p>🛒 ShopCloud &copy; 2026 | Built on AWS | All rights reserved</p>
    </div>
  </footer>

  <script>
    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const container = document.getElementById('cart-items');
      const countEl = document.getElementById('item-count');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl = document.getElementById('total-price');
      const cartCountEl = document.getElementById('cart-count');

      cartCountEl.textContent = cart.length;

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <div class="empty-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added anything yet.</p>
            <a href="index.html" class="continue-btn">Continue Shopping</a>
          </div>`;
        document.getElementById('checkout-btn').style.display = 'none';
        countEl.textContent = '0';
        subtotalEl.textContent = '₹0';
        totalEl.textContent = '₹0';
        return;
      }

      let total = 0;
      container.innerHTML = '';

      cart.forEach((item, index) => {
        total += item.price;
        container.innerHTML += `
          <div class="cart-item" id="item-${index}">
            <img src="https://placehold.co/80x80?text=📦" alt="${item.name}" class="cart-item-img"/>
            <div class="cart-item-details">
              <h4>${item.name}</h4>
              <p class="item-stock">✅ In Stock</p>
              <p class="item-delivery">FREE Delivery by Tomorrow</p>
              <button class="remove-btn" onclick="removeItem(${index})">🗑️ Remove</button>
            </div>
            <div class="cart-item-price">₹${item.price.toLocaleString()}</div>
          </div>`;
      });

      countEl.textContent = cart.length;
      subtotalEl.textContent = '₹' + total.toLocaleString();
      totalEl.textContent = '₹' + total.toLocaleString();
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }

    function checkout() {
      alert('🎉 Order Placed Successfully!\nThank you for shopping with ShopCloud.\nYou will receive a confirmation email shortly.');
      localStorage.removeItem('cart');
      window.location.href = 'index.html';
    }

    loadCart();
  </script>

</body>
</html>
